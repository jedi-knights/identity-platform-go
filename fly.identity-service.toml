# Fly.io config for identity-service. Deploy: fly deploy -c fly.identity-service.toml
# Private app; PostgreSQL-backed (IDENTITY_DATABASE_URL set via `fly mpg attach`).

app            = "jk-identity-service"
primary_region = "iad"
kill_signal    = "SIGTERM"
kill_timeout   = "30s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE_NAME = "identity-service"

[env]
  # Bind IPv6 so the app is reachable on Fly's .internal (6PN) network.
  IDENTITY_SERVER_HOST     = "[::]"
  IDENTITY_SERVER_PORT     = "8081"
  IDENTITY_LOG_FORMAT      = "json"
  IDENTITY_LOG_LEVEL       = "info"
  IDENTITY_LOG_ENVIRONMENT = "production"

[checks]
  [checks.health]
    type         = "http"
    port         = 8081
    path         = "/health"
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
