# Fly.io config for example-resource-service. Deploy: fly deploy -c fly.example-resource-service.toml
# Private app; PostgreSQL-backed (RESOURCE_DATABASE_URL via attach). Delegates token
# validation to introspection and authorization to the policy service.

app            = "jk-example-resource-service"
primary_region = "iad"
kill_signal    = "SIGTERM"
kill_timeout   = "30s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE_NAME = "example-resource-service"

[env]
  # Bind IPv6 so the app is reachable on Fly's .internal (6PN) network.
  RESOURCE_SERVER_HOST      = "[::]"
  RESOURCE_SERVER_PORT      = "8085"
  RESOURCE_LOG_FORMAT       = "json"
  RESOURCE_LOG_LEVEL        = "info"
  RESOURCE_LOG_ENVIRONMENT  = "production"
  # Inter-service URLs over the private network.
  RESOURCE_INTROSPECTION_URL = "http://jk-token-introspection-service.internal:8083"
  RESOURCE_POLICY_URL        = "http://jk-authorization-policy-service.internal:8084"

[checks]
  [checks.health]
    type         = "http"
    port         = 8085
    path         = "/health"
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
