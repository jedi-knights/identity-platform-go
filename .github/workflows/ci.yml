name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - libs/errors
          - libs/httputil
          - libs/logging
          - libs/testutil
          - services/auth-server
          - services/authorization-policy-service
          - services/client-registry-service
          - services/example-resource-service
          - services/identity-service
          - services/token-introspection-service
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.1.6
          args: --timeout=5m
          working-directory: ${{ matrix.module }}

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.work.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests
        run: |
          find . -name "go.mod" -not -path "*/vendor/*" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -tags unit ./... -race -count=1) || exit 1
          done

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.work.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run integration tests
        run: |
          find . -name "go.mod" -not -path "*/vendor/*" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -tags integration ./... -race -count=1) || exit 1
          done
