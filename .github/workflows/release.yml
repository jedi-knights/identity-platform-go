name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-server
          - identity-service
          - client-registry-service
          - token-introspection-service
          - authorization-policy-service
          - example-resource-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Determine next version for ${{ matrix.service }}
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "${{ matrix.service }}/v"
          major_pattern: "/^feat(\\(.+\\))?!:|^BREAKING CHANGE/"
          minor_pattern: "/^feat(\\(.+\\))?:/"
          version_format: "${major}.${minor}.${patch}"
          search_commit_body: true
          bump_each_commit: false
          change_path: "services/${{ matrix.service }}"

      - name: Build ${{ matrix.service }}
        if: steps.version.outputs.changed == 'true'
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/${{ matrix.service }} \
            ./services/${{ matrix.service }}/...

      - name: Create GitHub Release for ${{ matrix.service }}
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ matrix.service }}/v${{ steps.version.outputs.version }}"
          name: "${{ matrix.service }} v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/${{ matrix.service }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
