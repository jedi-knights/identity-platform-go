version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - gocyclo
    - godot
  disable:
    - exhaustruct
    - exhaustive
    - funlen
    - wsl
    - nlreturn
    - godox
    - paralleltest
    - testpackage
    - varnamelen
  settings:
    gocyclo:
      min-complexity: 7
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: docs/docs\.go
        linters:
          - godot
      - source: "// @"
        linters:
          - godot

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ocrosby/identity-platform-go
