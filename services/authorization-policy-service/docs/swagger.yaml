basePath: /
definitions:
  github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.EvaluationRequest:
    properties:
      action:
        type: string
      resource:
        type: string
      subject_id:
        type: string
    type: object
  github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.EvaluationResponse:
    properties:
      allowed:
        type: boolean
      reason:
        type: string
    type: object
  github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.SubjectPermissions:
    properties:
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
      subject_id:
        type: string
    type: object
  httputil.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
host: localhost:8084
info:
  contact: {}
  description: Fine-grained RBAC authorization policy evaluation.
  title: Authorization Policy Service API
  version: "1.0"
paths:
  /evaluate:
    post:
      consumes:
      - application/json
      description: Evaluates RBAC policies for a subject against a resource and action
      parameters:
      - description: Evaluation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.EvaluationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.EvaluationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Evaluate authorization policy
      tags:
      - policy
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /subjects/{subjectID}/permissions:
    get:
      description: Returns all roles and resolved permissions for a subject. Used
        by auth-server at token issuance.
      parameters:
      - description: Subject ID
        in: path
        name: subjectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_authorization-policy-service_internal_domain.SubjectPermissions'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Get subject permissions
      tags:
      - policy
swagger: "2.0"
