basePath: /
definitions:
  github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.AuthorizationServerMetadata:
    properties:
      authorization_details_types_supported:
        description: |-
          AuthorizationDetailsTypesSupported lists the RFC 9396 §10 type
          discriminators this server understands (ADR-0017). Emitted on
          both /.well-known endpoints because clients use it to decide
          whether to opt into the richer parameter.
        items:
          type: string
        type: array
      authorization_endpoint:
        type: string
      claim_types_supported:
        items:
          type: string
        type: array
      claims_supported:
        items:
          type: string
        type: array
      code_challenge_methods_supported:
        items:
          type: string
        type: array
      end_session_endpoint:
        type: string
      grant_types_supported:
        items:
          type: string
        type: array
      id_token_signing_alg_values_supported:
        items:
          type: string
        type: array
      introspection_endpoint:
        type: string
      introspection_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      issuer:
        type: string
      jwks_uri:
        type: string
      registration_endpoint:
        type: string
      request_parameter_supported:
        description: |-
          RequestParameterSupported and friends are pointer-bool so the
          "false" value is distinguishable from "omitted" — RFC 8414 §2 lets
          us emit either, and emitting an explicit false is what every major
          IdP does to telegraph that the feature is intentionally off.
        type: boolean
      request_uri_parameter_supported:
        type: boolean
      require_request_uri_registration:
        type: boolean
      response_modes_supported:
        items:
          type: string
        type: array
      response_types_supported:
        items:
          type: string
        type: array
      revocation_endpoint:
        type: string
      revocation_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      scopes_supported:
        items:
          type: string
        type: array
      service_documentation:
        type: string
      subject_types_supported:
        items:
          type: string
        type: array
      token_endpoint:
        type: string
      token_endpoint_auth_methods_supported:
        items:
          type: string
        type: array
      ui_locales_supported:
        items:
          type: string
        type: array
      userinfo_endpoint:
        description: |-
          OIDC Discovery 1.0 §3 additions. Emitted in the OIDC Discovery
          document; RFC 8414 §2 tolerates the extras but they convey OIDC
          semantics, so the RFC 8414 path omits them.
        type: string
    type: object
  github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.GrantResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      id_token:
        description: |-
          IDToken is the OIDC ID token (OIDC Core §2) issued when the granted
          scopes include "openid". Empty + omitempty when OIDC mode is not active,
          matching the OAuth-only response shape clients see today.
        type: string
      issued_token_type:
        description: |-
          IssuedTokenType is the RFC 8693 §2.2.1 echo of the issued token
          type URN. Omitted from non-token-exchange responses so the wire
          shape for client_credentials / authorization_code / refresh_token
          is unchanged — RFC 8693 requires the field only on the
          token-exchange response.
        type: string
      refresh_token:
        type: string
      scope:
        type: string
      token_type:
        type: string
    type: object
  github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.IntrospectResponse:
    properties:
      active:
        type: boolean
      aud:
        items:
          type: string
        type: array
      authorization_details:
        description: |-
          AuthorizationDetails echoes the RFC 9396 §10.1 granted-details
          array. Omitted when empty so RAR-unaware resource servers see
          the same shape they always have.
        items:
          items:
            format: int32
            type: integer
          type: array
        type: array
      client_id:
        type: string
      exp:
        type: integer
      iat:
        type: integer
      iss:
        type: string
      jti:
        type: string
      scope:
        type: string
      sub:
        type: string
      token_type:
        type: string
    type: object
  httputil.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: OAuth2 Authorization Server - token issuance, introspection, and revocation.
  title: Auth Server API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Public keys for verifying RS256-signed access tokens (RFC 7517).
      produces:
      - application/jwk-set+json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: JWKS endpoint
      tags:
      - oauth
  /.well-known/oauth-authorization-server:
    get:
      description: Returns the OAuth 2.0 Authorization Server Metadata document
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.AuthorizationServerMetadata'
      summary: RFC 8414 metadata document
      tags:
      - metadata
  /.well-known/openid-configuration:
    get:
      description: Returns the OIDC discovery document
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.AuthorizationServerMetadata'
      summary: OIDC Discovery 1.0 metadata document
      tags:
      - metadata
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /oauth/authorize:
    get:
      description: Starts an OAuth 2.1 + OIDC authorize flow (ADR-0011)
      produces:
      - text/html
      responses:
        "302":
          description: Redirect to login-ui sign-in page
      summary: Authorization endpoint
      tags:
      - oauth
  /oauth/introspect:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates and returns metadata for a token per RFC 7662
      parameters:
      - description: Token to introspect
        in: formData
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.IntrospectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Introspect token
      tags:
      - oauth
  /oauth/revoke:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Revokes a token per RFC 7009
      parameters:
      - description: Token to revoke
        in: formData
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Token revoked
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Revoke token
      tags:
      - oauth
  /oauth/token:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Issues an OAuth2 access token using the specified grant type (RFC
        6749)
      parameters:
      - description: OAuth2 grant type
        in: formData
        name: grant_type
        required: true
        type: string
      - description: Client identifier
        in: formData
        name: client_id
        required: true
        type: string
      - description: Client secret
        in: formData
        name: client_secret
        required: true
        type: string
      - description: Space-delimited list of scopes
        in: formData
        name: scope
        type: string
      - description: Authorization code
        in: formData
        name: code
        type: string
      - description: PKCE code verifier
        in: formData
        name: code_verifier
        type: string
      - description: Redirect URI
        in: formData
        name: redirect_uri
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_auth-server_internal_domain.GrantResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Issue access token
      tags:
      - oauth
  /userinfo:
    get:
      description: Returns the OIDC claims permitted by the access token's scopes.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: OIDC UserInfo
      tags:
      - oidc
swagger: "2.0"
