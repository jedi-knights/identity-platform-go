host: localhost:8082
info:
  contact: {}
  description: OAuth2 client registration, management, and credential validation.
  title: Client Registry Service API
  version: "1.0"
paths:
  /clients:
    get:
      description: Returns all registered OAuth2 clients (secrets excluded)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.GetClientResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: List all registered clients
      tags:
      - clients
    post:
      consumes:
      - application/json
      description: Creates a new OAuth2 client with generated credentials
      parameters:
      - description: Client registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.CreateClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.CreateClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Register a new OAuth client
      tags:
      - clients
  /clients/{id}:
    delete:
      description: 'Deletes an OAuth2 client by ID. Idempotent: deleting an absent
        client returns 204.'
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Client deleted
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Delete a client
      tags:
      - clients
    get:
      description: Returns details for a specific OAuth2 client by ID
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.GetClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Get a specific client
      tags:
      - clients
  /clients/validate:
    post:
      consumes:
      - application/json
      description: Returns 200 when credentials are valid. Returns 401 when credentials
        are rejected.
      parameters:
      - description: Client credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.ValidateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.ValidateClientResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "413":
          description: Request Entity Too Large
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Validate client credentials
      tags:
      - clients
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /register:
    post:
      consumes:
      - application/json
      description: Registers a new OAuth client. The response carries the issued credentials
        plus a registration access token for use with the RFC 7592 management endpoints.
      parameters:
      - description: Client metadata
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.RegistrationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.RegistrationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.RegistrationError'
        "413":
          description: request body too large
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_client-registry-service_internal_domain.RegistrationError'
      summary: RFC 7591 Dynamic Client Registration
      tags:
      - registration
swagger: "2.0"
