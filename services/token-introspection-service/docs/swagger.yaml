basePath: /
definitions:
  github_com_ocrosby_identity-platform-go_services_token-introspection-service_internal_domain.IntrospectionResult:
    properties:
      active:
        type: boolean
      client_id:
        type: string
      exp:
        type: integer
      iat:
        type: integer
      iss:
        type: string
      scope:
        items:
          type: string
        type: array
      sub:
        type: string
      token_type:
        type: string
    type: object
  httputil.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
host: localhost:8083
info:
  contact: {}
  description: JWT token validation and metadata extraction per RFC 7662.
  title: Token Introspection Service API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /introspect:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Validates a JWT token and returns metadata per RFC 7662
      parameters:
      - description: JWT token to introspect
        in: formData
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_ocrosby_identity-platform-go_services_token-introspection-service_internal_domain.IntrospectionResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httputil.ErrorResponse'
      summary: Introspect token
      tags:
      - introspection
swagger: "2.0"
