# Fly.io config for auth-server. Deploy: fly deploy -c fly.auth-server.toml
# Private app (no [http_service]/public IP); reached by the gateway over .internal.

app            = "jk-auth-server"
primary_region = "iad"
kill_signal    = "SIGTERM"
kill_timeout   = "30s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE_NAME = "auth-server"

[env]
  # Bind IPv6 so the app is reachable on Fly's .internal (6PN) network.
  # The service defaults to 0.0.0.0 (IPv4-only), which .internal cannot reach.
  AUTH_SERVER_HOST          = "[::]"
  AUTH_SERVER_PORT          = "8080"
  AUTH_LOG_FORMAT           = "json"
  AUTH_LOG_LEVEL            = "info"
  AUTH_LOG_ENVIRONMENT      = "production"
  AUTH_JWT_ISSUER           = "identity-platform"
  AUTH_TOKEN_TTL_SECONDS    = "3600"
  # Seed a test OAuth client at startup so the platform is testable end-to-end.
  # Set to "false" for a real production deployment.
  AUTH_DEV_SEED_CLIENTS     = "true"
  # Inter-service URLs over the private network.
  AUTH_CLIENT_REGISTRY_URL  = "http://jk-client-registry-service.internal:8082"
  AUTH_IDENTITY_SERVICE_URL = "http://jk-identity-service.internal:8081"

# Machine-level health check (no public routing required).
[checks]
  [checks.health]
    type         = "http"
    port         = 8080
    path         = "/health"
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
