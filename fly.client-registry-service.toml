# Fly.io config for client-registry-service. Deploy: fly deploy -c fly.client-registry-service.toml
# Private app; PostgreSQL-backed (CLIENT_DATABASE_URL set via `fly mpg attach`).

app            = "jk-client-registry-service"
primary_region = "iad"
kill_signal    = "SIGTERM"
kill_timeout   = "30s"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    SERVICE_NAME = "client-registry-service"

[env]
  # Bind IPv6 so the app is reachable on Fly's .internal (6PN) network.
  CLIENT_SERVER_HOST     = "[::]"
  CLIENT_SERVER_PORT     = "8082"
  CLIENT_LOG_FORMAT      = "json"
  CLIENT_LOG_LEVEL       = "info"
  CLIENT_LOG_ENVIRONMENT = "production"

[checks]
  [checks.health]
    type         = "http"
    port         = 8082
    path         = "/health"
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
